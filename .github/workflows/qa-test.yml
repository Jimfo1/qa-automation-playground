name: QA Test Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (uat or prod)"
        required: true
        default: "uat"

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Set base URL
        run: |
          if [ "${{ github.event.inputs.environment }}" = "uat" ]; then
            echo "BASE_URL=https://jsonplaceholder.typicode.com" >> $GITHUB_ENV
          else
            echo "BASE_URL=https://jsonplaceholder.typicode.com" >> $GITHUB_ENV
          fi

      - name: Test Case 1 - Get Post
        run: |
          response=$(curl -s $BASE_URL/posts/1)
          if echo "$response" | grep -q "userId"; then
            echo "TC1 Passed"
          else
            echo "TC1 Failed"
            exit 1
          fi

      - name: Test Case 2 - Check Title Exists
        run: |
          response=$(curl -s $BASE_URL/posts/1)
          if echo "$response" | grep -q "title"; then
            echo "TC2 Passed"
          else
            echo "TC2 Failed"
            exit 1
          fi

      - name: Test Case 3 - Simulate Failure (like real defect)
        run: |
          response=$(curl -s $BASE_URL/posts/1)
          if echo "$response" | grep -q "nonexistentField"; then
            echo "TC3 Passed"
          else
            echo "❌ TC3 Failed - Field missing (Simulated defect)"
            exit 1
          fi
